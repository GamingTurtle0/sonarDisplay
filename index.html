<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>海洋展示互動介面 V2</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            user-select: none;
        }

        /* --- 第一層：全螢幕 16:9 背景 --- */
        #full-bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
        }

        #full-bg-video {
            width: 100%;
            height: 100%;
            object-fit: cover; /* 確保填滿 16:9 螢幕 */
        }

        /* --- 第二層：左下角 1/4 互動區 --- */
        #interactive-zone {
            position: absolute;
            bottom: 10px; /* 稍微離邊緣一點比較美觀 */
            left: 15px;
            width: 25vw; /* 縮放至約 1/4 畫面寬度 */
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        /* 聲吶影片容器 (3:2 比例) */
        #sonar-container {
            position: relative;
            width: 100%;
            aspect-ratio: 3 / 2; /* 強制 3:2 比例 */
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            background: #000;
        }

        #bg-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: top; /* 影片頂部置頂，不被吃掉 */
        }

        /* 左下角台灣地圖 (相對於 sonar-container 定位) */
        #tw-video-container {
            position: absolute;
            bottom: 5%;
            left: 3%;
            width: 17.5%;
            aspect-ratio: 40 / 54.6;
            border-radius: 10px;
            overflow: hidden;
            z-index: 12;
        }

        #tw-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 魚類圖片彈出區 (相對於 sonar-container 定位) */
        #popup-container {
            position: absolute;
            bottom: 5%;
            left: 22%;
            width: 74%;
            aspect-ratio: 170 / 54.6;
            z-index: 13;
            border-radius: 8px;
            overflow: hidden;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.4s ease, transform 0.4s ease;
            pointer-events: none;
        }

            #popup-container.show {
                opacity: 1;
                transform: translateY(0);
                pointer-events: auto;
            }

        #popup-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body>

    <div id="full-bg-container">
        <video id="full-bg-video" muted autoplay loop>
            <source src="" type="video/mp4" id="full-bg-source">
        </video>
    </div>

    <div id="interactive-zone">
        <div id="sonar-container">
            <video id="bg-video" muted autoplay loop>
                <source src="" type="video/mp4" id="bg-source">
            </video>

            <div id="tw-video-container">
                <video id="tw-video" muted autoplay loop>
                    <source src="" type="video/mp4" id="tw-source">
            </div>

            <div id="popup-container">
                <img id="popup-image" src="" alt="魚類資訊">
            </div>
        </div>
    </div>

    <script>
        const mediaSets = [
            {
                bgFullVideo: 'video/fish1.mp4', // 新增：16:9 全螢幕背景影片
                bgVideo: 'video/sonar1.mp4',       // 原本的 3:2 聲吶影片
                twVideo: 'video/north/north.mp4',
                leftImg: 'fishnorth.png',
                rightImg: 'north.png'
            },
            {
                bgFullVideo: 'video/fish4.mp4',
                bgVideo: 'video/sonar4.mp4',
                twVideo: 'video/east/east.mp4',
                leftImg: 'fisheast.png',
                rightImg: 'east.png'
            },
            {
                bgFullVideo: 'video/fish3.mp4',
                bgVideo: 'video/sonar3.mp4',
                twVideo: 'video/south/south.mp4',
                leftImg: 'fishsouth.png',
                rightImg: 'south.png'
            },
            {
                bgFullVideo: 'video/fish2.mp4',
                bgVideo: 'video/sonar2.mp4',
                twVideo: 'video/west/west.mp4',
                leftImg: 'fishwest.png',
                rightImg: 'west.png'
            }
        ];

        let currentSetIndex = 0;
        let currentPopup = 'none';

        const fullBgVideoNode = document.getElementById('full-bg-video');
        const fullBgSource = document.getElementById('full-bg-source');
        const bgVideoNode = document.getElementById('bg-video');
        const bgSource = document.getElementById('bg-source');
        const twVideoNode = document.getElementById('tw-video');
        const twSource = document.getElementById('tw-source');
        const popupContainer = document.getElementById('popup-container');
        const popupImage = document.getElementById('popup-image');

        function loadMediaSet(index) {
            const data = mediaSets[index];

            // 更新全螢幕背景
            fullBgSource.src = data.bgFullVideo;
            fullBgVideoNode.load();

            // 更新左下角聲吶影片
            bgSource.src = data.bgVideo;
            bgVideoNode.load();

            // 更新地圖
            twSource.src = data.twVideo;
            twVideoNode.load();

            hidePopup();
            console.log(`切換至第 ${index + 1} 組影片`);
        }

        function togglePopup(type) {
            const data = mediaSets[currentSetIndex];
            const targetImgSrc = type === 'left' ? data.leftImg : data.rightImg;

            if (currentPopup === type) {
                hidePopup();
                return;
            }

            if (currentPopup !== 'none') {
                hidePopup();
                setTimeout(() => { showPopup(targetImgSrc, type); }, 400);
                return;
            }

            showPopup(targetImgSrc, type);
        }

        function showPopup(imgSrc, type) {
            popupImage.src = imgSrc;
            popupContainer.classList.add('show');
            currentPopup = type;
        }

        function hidePopup() {
            popupContainer.classList.remove('show');
            currentPopup = 'none';
        }

        // 監聽左鍵
        document.addEventListener('click', () => { togglePopup('left'); });

        // 監聽右鍵
        document.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            togglePopup('right');
        });

        // 鍵盤切換
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') {
                currentSetIndex = (currentSetIndex + 1) % mediaSets.length;
                loadMediaSet(currentSetIndex);
            } else if (e.key === 'ArrowLeft') {
                currentSetIndex = (currentSetIndex - 1 + mediaSets.length) % mediaSets.length;
                loadMediaSet(currentSetIndex);
            }
        });

        // 滾輪切換
        let isScrolling = false;
        document.addEventListener('wheel', (e) => {
            if (isScrolling) return;
            isScrolling = true;
            if (e.deltaY > 0) {
                currentSetIndex = (currentSetIndex + 1) % mediaSets.length;
            } else {
                currentSetIndex = (currentSetIndex - 1 + mediaSets.length) % mediaSets.length;
            }
            loadMediaSet(currentSetIndex);
            setTimeout(() => { isScrolling = false; }, 800);
        });

        loadMediaSet(currentSetIndex);
    </script>
</body>
</html>
